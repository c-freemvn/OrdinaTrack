<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/signin#signup">
    <title>Redirecting</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="auth-shell auth-page">
    <main class="auth-layout">
        <section class="auth-form-panel">
            <div class="auth-card auth-card-main auth-redirect-card">
                <a href="/" class="auth-close-btn" aria-label="Return to landing page">&times;</a>
                <h2>Redirecting to sign up...</h2>
                <p>If the page does not change automatically, continue to the sign up screen or return to the landing page.</p>
                <div class="auth-action-row">
                    <a href="/signin#signup" class="btn auth-primary-btn">Continue</a>
                    <a href="/" class="btn btn-outline-dark auth-secondary-btn">Cancel</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
